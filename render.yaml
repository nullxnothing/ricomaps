services:
  - type: web
    name: ricomaps-laserstream-worker
    runtime: node
    rootDir: worker
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: HELIUS_LASERSTREAM_API_KEY
        sync: false
      - key: HELIUS_LASERSTREAM_ENDPOINT
        value: https://laserstream-mainnet-ewr.helius-rpc.com
      - key: APP_ORIGIN
        sync: false
      - key: PORT
        value: 8080
      # Atlas ingestion (Global Cabal Map) — both required to enable it.
      - key: ATLAS_APP_URL
        sync: false
      - key: INTERNAL_API_SECRET
        sync: false
      # Live crew-buy beams — cap on roster wallets watched on LaserStream.
      - key: ATLAS_MAX_WALLETS
        value: 200
      # X (Twitter) reply bot: all five required to enable it (plus ATLAS_APP_URL + INTERNAL_API_SECRET).
      - key: X_USER_ID
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_REFRESH_TOKEN
        sync: false
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
