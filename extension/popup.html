<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 220px;
      margin: 0;
      padding: 14px;
      background: #050505;
      color: #e5e5e5;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .title { font-size: 14px; font-weight: 700; color: #00ff41; margin-bottom: 2px; }
    .sub { font-size: 11px; color: #888; margin-bottom: 14px; }
    .row { display: flex; align-items: center; justify-content: space-between; }
    .label { font-size: 12px; }
    .switch { position: relative; width: 38px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer;
      background: #333; border-radius: 20px; transition: 0.15s;
    }
    .slider::before {
      content: ""; position: absolute; height: 14px; width: 14px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: 0.15s;
    }
    input:checked + .slider { background: #00cc66; }
    input:checked + .slider::before { transform: translateX(18px); }
    .link { display: block; margin-top: 14px; font-size: 11px; color: #5b7fff; text-decoration: none; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="title">RicoMaps</div>
  <div class="sub">Cabal bubble map on axiom.trade</div>
  <div class="row">
    <span class="label">Show on axiom</span>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>
  <a class="link" href="https://ricomaps.fun" target="_blank" rel="noopener">Open ricomaps.fun ↗</a>
  <script src="popup.js"></script>
</body>
</html>
